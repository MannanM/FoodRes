name: Deploy to S3

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-2

      - name: Deploy to S3
        run: |
          aws s3 sync dist/ s3://foodres.mannanlive.com --exclude "index.html" --exclude "sw.js" --exclude "manifest.webmanifest" --delete --quiet --size-only
          aws s3 cp ./dist/index.html s3://foodres.mannanlive.com/index.html --cache-control "no-cache, no-store, must-revalidate"
          aws s3 cp ./dist/sw.js s3://foodres.mannanlive.com/sw.js --cache-control "no-cache, no-store, must-revalidate"
          aws s3 cp ./dist/manifest.webmanifest s3://foodres.mannanlive.com/manifest.webmanifest --cache-control "no-cache, no-store, must-revalidate" || true

      #- name: Invalidate CloudFront
      #  run: |
      #    aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/index.html" "/sw.js" "/manifest.webmanifest"

